{% extends "base.html" %}
{% block title %}Raise Demand — CampusTrade{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Raise a Demand</h2>
  <a href="{{ url_for('demands.list_demands') }}" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('demands.add_demand') }}" novalidate>
    <div class="form-group">
      <label for="title">What are you looking for? *</label>
      <input type="text" id="title" name="title" placeholder="e.g. Engineering Drawing Set, 2nd year" required />
    </div>
    <div class="form-group">
      <label for="description">Details</label>
      <textarea id="description" name="description" rows="4"
                placeholder="Describe what you need, condition preferences, urgency…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">Select category</option>
          {% for c in categories %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="budget">Budget (₹)</label>
        <input type="number" id="budget" name="budget" step="0.01" min="0" placeholder="0.00" />
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Post Demand</button>
      <a href="{{ url_for('demands.list_demands') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
