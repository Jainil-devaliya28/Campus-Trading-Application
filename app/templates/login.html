{% extends "base.html" %}
{% block title %}Login — CampusTrade{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Campus<span>Trade</span></h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@college.edu" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
