{% extends "base.html" %}
{% block title %}Feedback — CampusTrade{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Send Feedback</h2>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline">← Dashboard</a>
</div>

<div class="form-card">
  <p class="form-intro">Help us improve CampusTrade. Your feedback is valuable and read by our team.</p>
  <form method="POST" action="{{ url_for('main.feedback') }}" novalidate>
    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="e.g. Feature request, Bug report…" />
    </div>
    <div class="form-group">
      <label for="message">Message *</label>
      <textarea id="message" name="message" rows="6" placeholder="Tell us what you think…" required></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Submit Feedback</button>
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
