{% extends "base.html" %}
{% block title %}403 — Forbidden{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">403</div>
  <h2>Access Denied</h2>
  <p>You don't have permission to access this page.</p>
  <a href="{{ url_for('main.dashboard') if session.member_id else url_for('auth.login') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
