{% extends "base.html" %}
{% block title %}Register — CampusTrade{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <h1>Campus<span>Trade</span></h1>
      <p>Create your student account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <h3 class="section-label">Personal Info</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="you@college.edu" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" placeholder="Min. 6 characters" required />
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password *</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required />
        </div>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000" />
      </div>

      <h3 class="section-label">Academic Info</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="college_name">Hostel Name & Room Number</label>
          <input type="text" id="college_name" name="college_name" placeholder="Your hostel and room number" />
        </div>
        <div class="form-group">
          <label for="department">Department</label>
          <input type="text" id="department" name="department" placeholder="e.g. Computer Science" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="year">Year</label>
          <input type="number" id="year" name="year" placeholder="1 – 4" min="1" max="6" />
        </div>
        <div class="form-group">
          <label for="roll_number">Roll Number</label>
          <input type="text" id="roll_number" name="roll_number" placeholder="e.g. CS2021001" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
