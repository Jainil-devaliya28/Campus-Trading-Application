{% extends "base.html" %}
{% block title %}Change Password — CampusTrade{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Change Password</h2>
  <a href="{{ url_for('main.profile', member_id=session.member_id) }}" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('auth.change_password') }}" novalidate>
    <div class="form-group">
      <label for="current_password">Current Password *</label>
      <input type="password" id="current_password" name="current_password"
             placeholder="Your current password" required />
    </div>
    <div class="form-group">
      <label for="new_password">New Password *</label>
      <input type="password" id="new_password" name="new_password"
             placeholder="Min. 6 characters" required />
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password *</label>
      <input type="password" id="confirm_password" name="confirm_password"
             placeholder="Repeat new password" required />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('main.profile', member_id=session.member_id) }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
